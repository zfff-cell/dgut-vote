<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年度莞工之星评选</title>
<!-- 🔴 已替换为 unpkg CDN，不会被拦截 -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root { --green: #28a745; --light: #e8f5e9; }
* { box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", sans-serif;
  background: var(--light);
  margin: 0;
  padding: 15px;
}
.container {
  max-width: 1000px;
  margin: 0 auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
}
.header {
  text-align: center;
  padding-bottom: 15px;
  border-bottom: 2px solid var(--green);
}
.logo {
  width: 100px;
}
h1 {
  color: var(--green);
  font-size: 22px;
  margin: 10px 0 5px;
}
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin: 20px 0;
}
.tab {
  padding: 8px 14px;
  border: 1px solid var(--green);
  color: var(--green);
  border-radius: 50px;
  background: white;
  cursor: pointer;
  font-size: 14px;
}
.tab.active, .tab:hover {
  background: var(--green);
  color: white;
}
.list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
@media (min-width: 600px) {
  .list { grid-template-columns: 1fr 1fr; }
}
.card {
  padding: 16px;
  border: 1px solid #eee;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-left: 4px solid var(--green);
}
.info h3 {
  margin: 0 0 6px;
  font-size: 16px;
}
.tag {
  background: var(--green);
  color: white;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
  margin-right: 6px;
}
.vote-btn {
  background: var(--green);
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
}
.vote-btn:disabled {
  background: #ccc;
}
#status {
  text-align: center;
  padding: 10px;
  border-radius: 6px;
  margin: 10px 0;
  display: none;
}
.success {
  background: #d4edda;
  color: #155724;
}
.error {
  background: #f8d7da;
  color: #721c24;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <img src="dgut-logo.png" class="logo" alt="Logo">
    <h1>2026年度莞工之星评选</h1>
  </div>

  <div class="tabs">
    <div class="tab active" data-cate="all">全部</div>
    <div class="tab" data-cate="自强之星">自强之星</div>
    <div class="tab" data-cate="志愿之星">志愿之星</div>
    <div class="tab" data-cate="团队之星">团队之星</div>
    <div class="tab" data-cate="学术之星">学术之星</div>
    <div class="tab" data-cate="文体之星">文体之星</div>
  </div>

  <div id="status"></div>
  <div id="list" class="list">加载中...</div>
</div>

<script>
// 🔴 这里变量名改为 supabaseJs（小写 s），对应新 CDN
const supabase = supabaseJs.createClient(
  "https://xttxhcalaqwtufhmfji.supabase.co",
  "sb_publishable_aXblcIYw2XZGSyNjUuh4mQ_o_e"
);

let currentCate = "all";
const VOTED_KEY = "voted_ids";

function getVotedIds() {
  try { return JSON.parse(localStorage.getItem(VOTED_KEY)) || []; } catch (e) { return []; }
}
function markVoted(id) {
  const arr = getVotedIds();
  if (!arr.includes(id)) {
    arr.push(id);
    localStorage.setItem(VOTED_KEY, JSON.stringify(arr));
  }
}

async function loadList() {
  let query = supabase.from("candidates").select("*").order("votes", { ascending: false });
  if (currentCate !== "all") query = query.eq("category", currentCate);

  const { data, error } = await query;
  if (error) {
    document.getElementById("list").innerHTML = "加载失败";
    return;
  }

  const voted = getVotedIds();
  document.getElementById("list").innerHTML = data.map(p => `
    <div class="card">
      <div class="info">
        <h3>${p.name}</h3>
        <div><span class="tag">${p.category}</span> ${p.college}</div>
        <div style="margin-top:6px;font-weight:bold;color:var(--green)">票数：${p.votes || 0}</div>
      </div>
      <button class="vote-btn" data-id="${p.id}" ${voted.includes(p.id) ? "disabled" : ""}>
        ${voted.includes(p.id) ? "已投票" : "投一票"}
      </button>
    </div>
  `).join("");
}

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentCate = tab.dataset.cate;
    loadList();
  });
});

document.getElementById("list").addEventListener("click", async (e) => {
  if (!e.target.matches(".vote-btn")) return;
  const id = e.target.dataset.id;
  const btn = e.target;

  btn.disabled = true;
  btn.textContent = "投票中...";

  const { error } = await supabase.rpc("increment_votes", { id });
  if (error) {
    showStatus("投票失败：" + error.message, "error");
    btn.disabled = false;
    btn.textContent = "投一票";
    return;
  }

  markVoted(id);
  btn.textContent = "✅已投票";
  showStatus("投票成功！", "success");
  loadList();
});

function showStatus(msg, type) {
  const s = document.getElementById("status");
  s.textContent = msg;
  s.className = type;
  s.style.display = "block";
  setTimeout(() => s.style.display = "none", 2500);
}

loadList();
setInterval(loadList, 10000);
</script>
</body>
</html>
