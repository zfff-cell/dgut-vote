<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年度莞工之星</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:Microsoft Yahei,sans-serif;background:#f7f9f7}
  .container{max-width:600px;margin:0 auto;padding:20px}
  .logo{text-align:center;margin:20px 0}
  .logo img{width:120px;height:120px;border-radius:50%}
  h1{text-align:center;color:#008844;font-size:28px;margin-bottom:10px}
  .subtitle{text-align:center;color:#666;margin-bottom:20px}
  .btn-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
  .category-btn{padding:8px 14px;border:none;border-radius:8px;background:#eee;font-size:14px}
  .category-btn.active{background:#008844;color:#fff}
  .card{background:#fff;border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.08)}
  .avatar{width:50px;height:50px;background:#ddd;border-radius:50%}
  .info{flex:1}
  .info h3{font-size:16px;margin-bottom:4px}
  .info p{font-size:13px;color:#666}
  .vote-btn{padding:6px 10px;background:#008844;color:#fff;border:none;border-radius:6px}
  .vote-btn:disabled{background:#999}
  .vote-count{margin-left:8px;font-size:13px;color:#666}
</style>
</head>
<body>
<div class="container">
  <div class="logo"><img src="./dgut-logo.png" alt="莞工校徽"></div>
  <h1>2026年度莞工之星</h1>
  <p class="subtitle">实时投票 · 云端同步</p >

  <div class="btn-bar">
    <button class="category-btn active" onclick="show('自强之星')">自强之星</button>
    <button class="category-btn" onclick="show('学术之星')">学术之星</button>
    <button class="category-btn" onclick="show('文体之星')">文体之星</button>
    <button class="category-btn" onclick="show('志愿之星')">志愿之星</button>
    <button class="category-btn" onclick="show('团队之星')">团队之星</button>
  </div>

  <div id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<script>
// ====================== 已为你填好的 Supabase 信息 ======================
const supabaseUrl = "https://xttxhcalqaqlwtufhmfji.supabase.co";
const supabaseKey = "sb_publishable_aXblcIYw2XZGSyMjUuh4mQ_O_eIyChD";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
// ====================================================================

let currentCat = "自强之星";

// 切换分类
async function show(cat) {
  currentCat = cat;
  document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
  [...document.querySelectorAll(".category-btn")].find(b => b.innerText === cat).classList.add("active");
  await loadList(cat);
}

// 从云端加载候选人
async function loadList(category) {
  const { data } = await supabase
    .from("candidates")
    .select("*")
    .eq("category", category);
  render(data || []);
}

// 渲染候选人列表
function render(list) {
  const box = document.getElementById("list");
  box.innerHTML = "";
  list.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="avatar"></div>
      <div class="info">
        <h3>${item.name}</h3>
        <p>${item.college}</p >
      </div>
      <div>
        <button class="vote-btn" onclick="doVote('${item.id}')">投票</button>
        <span class="vote-count">${item.votes || 0}</span>
      </div>
    `;
    box.appendChild(card);
  });
}

// 真实投票：票数+1
async function doVote(id) {
  await supabase.rpc("increment_votes", { id });
  loadList(currentCat);
}

// 初始加载
show("自强之星");
</script>
</body>
</html>
