<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莞工之星投票系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#e8f5e9;padding:15px}
.container{max-width:900px;margin:0 auto;background:white;padding:20px;border-radius:14px;box-shadow:0 2px 10px rgba(0,128,0,0.06)}
.header{text-align:center;padding-bottom:15px;border-bottom:2px solid #28a745}
h1{color:#28a745;font-size:22px}
h2{font-size:18px;margin:20px 0 10px;color:#226633;border-left:4px solid #28a745;padding-left:10px}
.login-box{margin:20px 0;text-align:center}
input,select{padding:10px 12px;margin:5px;border-radius:6px;border:1px solid #c3e6cb;outline:none}
button{padding:10px 14px;margin:5px;border-radius:6px;border:none;background:#28a745;color:white;cursor:pointer;font-weight:bold}
button:hover{background:#218838}
.tab-group{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0;justify-content:center}
.tab{padding:10px 16px;border:1px solid #28a745;border-radius:20px;background:white;color:#28a745}
.tab.active{background:#28a745;color:white}
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;margin:20px 0}
.card{border:1px solid #d4edda;background:#fafffc;border-radius:8px;padding:15px;text-align:center}
.card button{width:100%;margin-top:10px}
#status{text-align:center;padding:10px;margin:10px 0;display:none}
.success{background:#d4edda;color:#155724}
.error{background:#f8d7da;color:#721c24}
.stat-item{padding:10px;background:#f0fff4;border-radius:6px;margin:6px 0;border-left:3px solid #28a745}
.admin-card{border:1px solid #d4edda;background:#fafffc;border-radius:8px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.warning{background:#ffc107;color:#333}
.danger{background:#dc3545}
.row{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #e6ffe6}
.admin{margin-top:30px;padding-top:20px;border-top:2px solid #28a745}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>莞工之星 · 投票系统</h1>
    <p>每人每类限投一次</p>
  </div>

  <div id="status"></div>

  <div class="login-box">
    <input id="name" placeholder="姓名">
    <input id="stuId" placeholder="学号">
    <button onclick="login()">确认身份</button>
    <br/>
    <input type="password" id="adminPwd" placeholder="管理员密码" style="width:140px">
    <button onclick="showAdmin()">进入后台</button>
  </div>

  <div id="voteArea" style="display:none;">
    <div class="tab-group">
      <div class="tab active" onclick="tab('all')">全部</div>
      <div class="tab" onclick="tab('自强之星')">自强之星</div>
      <div class="tab" onclick="tab('志愿之星')">志愿之星</div>
      <div class="tab" onclick="tab('团队之星')">团队之星</div>
      <div class="tab" onclick="tab('学术之星')">学术之星</div>
      <div class="tab" onclick="tab('文体之星')">文体之星</div>
    </div>
    <div class="list" id="list"></div>
  </div>

  <div id="adminArea" class="admin" style="display:none;">
    <h2>① 添加候选人</h2>
    <input id="cname" placeholder="姓名">
    <select id="ccat">
      <option>自强之星</option>
      <option>志愿之星</option>
      <option>团队之星</option>
      <option>学术之星</option>
      <option>文体之星</option>
    </select>
    <input id="ccol" placeholder="学院">
    <button onclick="addCandidate()">添加候选人</button>

    <h2>② 分类票数统计</h2>
    <div id="categoryStat"></div>

    <h2>③ 候选人排行</h2>
    <div id="cList"></div>

    <h2>④ 投票记录</h2>
    <div id="rList"></div>

    <br>
    <button class="warning" onclick="resetAllVotes()">一键重置票数</button>
    <button onclick="exportExcel()">导出 Excel</button>
    <button class="danger" onclick="clearAll()">清空所有数据</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 已自动填入你的 Supabase 配置
const SUPABASE_URL = "https://xttxhcalaqwltufhmfji.supabase.co";
const SUPABASE_KEY = "sb_publishable_aXblcIYw2XZGSyMjUuh4mQ_O_eIyChD";

const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
const ADMIN_PWD = "123456"; // 管理员密码

let currentUser = null;
let currentTab = "all";

// 消息提示
function msg(text, cls) {
  let s = document.getElementById("status");
  s.textContent = text;
  s.className = cls;
  s.style.display = "block";
  setTimeout(() => s.style.display = "none", 2000);
}

// 用户登录
function login() {
  const name = document.getElementById("name").value.trim();
  const stuId = document.getElementById("stuId").value.trim();
  if (!name || !stuId) return msg("请填写姓名学号", "error");
  currentUser = name + "_" + stuId;
  document.getElementById("voteArea").style.display = "block";
  msg("登录成功", "success");
  renderVote();
}

// 切换投票分类
function tab(cat) {
  currentTab = cat;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  renderVote();
}

// 渲染投票页面
async function renderVote() {
  const { data: list } = await supabase.from("candidates").select("*");
  const arr = currentTab === "all" ? list : list.filter(i => i.category === currentTab);
  document.getElementById("list").innerHTML = arr.map(i => `
    <div class="card">
      <h3>${i.name}</h3>
      <p>${i.category}</p>
      <p>${i.college}</p>
      <p>票数：${i.votes}</p>
      <button onclick="doVote(${i.id})">投票</button>
    </div>
  `).join("");
}

// 执行投票
async function doVote(cid) {
  if (!currentUser) return msg("请先登录", "error");

  const { data: has } = await supabase
    .from("records")
    .select("*")
    .eq("user_key", currentUser)
    .eq("cid", cid);

  if (has.length > 0) return msg("你已投过此人", "error");

  await supabase.from("records").insert([{ user_key: currentUser, cid }]);
  await supabase.rpc("inc_vote", { cid });

  msg("投票成功", "success");
  renderVote();
}

// 显示管理员后台
function showAdmin() {
  const p = document.getElementById("adminPwd").value;
  if (p !== ADMIN_PWD) return msg("密码错误", "error");
  document.getElementById("adminArea").style.display = "block";
  msg("后台已解锁", "success");
  renderAdmin();
}

// 渲染管理员后台
async function renderAdmin() {
  const { data: candidates } = await supabase.from("candidates").select("*");
  const { data: records } = await supabase.from("records").select("*");
  candidates.sort((a, b) => b.votes - a.votes);

  // 分类统计
  const catMap = {};
  candidates.forEach(i => {
    if (!catMap[i.category]) catMap[i.category] = { c: 0, t: 0 };
    catMap[i.category].c++;
    catMap[i.category].t += i.votes;
  });

  let statHtml = "";
  for (let k in catMap) {
    statHtml += `<div class="stat-item">${k}：${catMap[k].c}人｜总票数${catMap[k].t}</div>`;
  }
  document.getElementById("categoryStat").innerHTML = statHtml;

  // 候选人列表
  document.getElementById("cList").innerHTML = candidates.map(i => `
    <div class="admin-card">
      <div>${i.name}｜${i.category}｜${i.college}｜票：${i.votes}</div>
      <button class="danger" onclick="delC(${i.id})">删除</button>
    </div>
  `).join("");

  // 投票记录
  document.getElementById("rList").innerHTML = records.map(r => `
     <div class="row"><span>${r.user_key}</span><span>${r.time}</span></div>
   `).join("");
 }
 // 添加候选人
 async function addCandidate() {
   const name = document.getElementById("cname").value.trim();
   const category = document.getElementById("ccat").value;
   const college = document.getElementById("ccol").value.trim();
   if (!name) return;
   const { error } = await supabase.from("candidates").insert([{ name, category, college }]);
   if (error) alert(error.message);
   renderAdmin();
   renderVote();
 }
 // 删除候选人
 async function delC(id) {
   await supabase.from("candidates").delete().eq("id", id);
   await supabase.from("records").delete().eq("cid", id);
   renderAdmin();
   renderVote();
 }
 // 一键重置所有票数
 async function resetAllVotes() {
   if (!confirm("确定重置所有票数？")) return;
   const { data: list } = await supabase.from("candidates").select("id");
   for (let item of list) {
     await supabase.from("candidates").update({ votes: 0 }).eq("id", item.id);
   }
   renderAdmin();
   renderVote();
 }
 // 导出 Excel（CSV 格式）
 async function exportExcel() {
   const { data: list } = await supabase.from("candidates").select("*");
   list.sort((a, b) => b.votes - a.votes);
   let csv = "排名,姓名,类别,学院,票数\n";
   list.forEach((i, idx) => {
     csv += `${idx+1},${i.name},${i.category},${i.college},${i.votes}\n`;
   });
   const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
   const a = document.createElement("a");
   a.href = URL.createObjectURL(blob);
   a.download = "莞工之星投票结果.csv";
   a.click();
 }
 // 清空所有数据
 async function clearAll() {
   if (!confirm("确定清空所有数据？不可恢复！")) return;
   await supabase.from("records").delete().neq("id", 0);
   await supabase.from("candidates").delete().neq("id", 0);
   location.reload();
 }
 // 初始化页面
 renderVote();
 </script>
 </body>
 </html>
