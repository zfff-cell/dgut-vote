<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莞工之星 - 投票系统</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Microsoft YaHei", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    background: #e8f5e9;
    padding: 15px;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
  }
  .header {
    text-align: center;
    padding-bottom: 15px;
    border-bottom: 2px solid #28a745;
  }
  h1 {
    color: #28a745;
    font-size: 22px;
  }
  .login-box {
    margin: 20px 0;
    text-align: center;
  }
  input {
    padding: 12px;
    font-size: 15px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin: 8px;
    width: 160px;
  }
  button {
    padding: 12px 20px;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    background: #28a745;
    color: white;
    margin: 8px;
    min-height: 44px;
    width: 120px;
  }
  .tab-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 20px 0;
    justify-content: center;
  }
  .tab {
    padding: 10px 16px;
    border: 1px solid #28a745;
    border-radius: 20px;
    background: white;
    color: #28a745;
  }
  .tab.active {
    background: #28a745;
    color: white;
  }
  .list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 15px;
    margin: 20px 0;
  }
  .card {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 15px;
    text-align: center;
  }
  .card button {
    width: 100%;
    margin-top: 10px;
  }
  #status {
    text-align: center;
    padding: 10px;
    margin: 10px 0;
    display: none;
  }
  .success {
    background: #d4edda;
    color: #155724;
  }
  .error {
    background: #f8d7da;
    color: #721c24;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>莞工之星 · 投票系统</h1>
    <p>一个姓名只能对应一个学号，每个类别限投1次</p>
  </div>

  <div id="status"></div>

  <div class="login-box">
    <input id="name" placeholder="姓名">
    <input id="stuId" placeholder="学号">
    <button onclick="login()">确认身份</button>
  </div>

  <div id="voteArea" style="display:none;">
    <div class="tab-group">
      <div class="tab active" onclick="switchTab('all')">全部</div>
      <div class="tab" onclick="switchTab('自强之星')">自强之星</div>
      <div class="tab" onclick="switchTab('志愿之星')">志愿之星</div>
      <div class="tab" onclick="switchTab('团队之星')">团队之星</div>
      <div class="tab" onclick="switchTab('学术之星')">学术之星</div>
      <div class="tab" onclick="switchTab('文体之星')">文体之星</div>
    </div>

    <div class="list" id="list"></div>
  </div>
</div>

<script>
  // 本地测试候选人
  const candidates = [
    { id:1, name:"张三", category:"自强之星", college:"机械学院", votes:10 },
    { id:2, name:"李四", category:"志愿之星", college:"计算机学院", votes:20 },
    { id:3, name:"王五", category:"团队之星", college:"材料学院", votes:30 },
    { id:4, name:"赵六", category:"学术之星", college:"电子学院", votes:40 },
    { id:5, name:"陈七", category:"文体之星", college:"文学院", votes:50 },
  ];

  let currentTab = 'all';
  let hasLogin = false;

  function login() {
    const name = document.getElementById('name').value.trim();
    const stuId = document.getElementById('stuId').value.trim();
    if (!name || !stuId) {
      showMsg("请填写姓名和学号", "error");
      return;
    }
    hasLogin = true;
    document.getElementById('voteArea').style.display = 'block';
    showMsg("登录成功", "success");
    renderList();
  }

  function switchTab(cat) {
    currentTab = cat;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderList();
  }

  function renderList() {
    const list = currentTab === 'all'
      ? candidates
      : candidates.filter(i => i.category === currentTab);

    document.getElementById('list').innerHTML = list.map(i => `
      <div class="card">
        <h3>${i.name}</h3>
        <p>${i.category}</p>
        <p>${i.college}</p>
        <p>票数：${i.votes}</p>
        <button onclick="vote(${i.id})">投票</button>
      </div>
    `).join('');
  }

  function vote(id) {
    if (!hasLogin) {
      showMsg("请先登录", "error");
      return;
    }
    showMsg("投票成功！", "success");
    const c = candidates.find(x => x.id === id);
    c.votes++;
    renderList();
  }

  function showMsg(text, type) {
    const s = document.getElementById('status');
    s.textContent = text;
    s.className = type;
    s.style.display = 'block';
    setTimeout(() => s.style.display = 'none', 2000);
  }
</script>

</body>
</html>
