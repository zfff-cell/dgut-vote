<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莞工之星投票</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#e8f5e9;padding:15px}
.container{max-width:900px;margin:0 auto;background:white;padding:20px;border-radius:12px}
.header{text-align:center;padding-bottom:15px;border-bottom:2px solid #28a745}
h1{color:#28a745;font-size:22px}
.login-box{margin:20px 0;text-align:center}
input{padding:12px;font-size:15px;border-radius:6px;border:1px solid #ccc;margin:8px;width:160px}
button{padding:12px 20px;border:none;border-radius:6px;background:#28a745;color:white;margin:8px;min-height:44px}
.tab-group{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0;justify-content:center}
.tab{padding:10px 16px;border:1px solid #28a745;border-radius:20px;background:white;color:#28a745}
.tab.active{background:#28a745;color:white}
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;margin:20px 0}
.card{border:1px solid #ddd;border-radius:8px;padding:15px;text-align:center}
.card button{width:100%;margin-top:10px}
#status{text-align:center;padding:10px;margin:10px 0;display:none}
.success{background:#d4edda;color:#155724}
.error{background:#f8d7da;color:#721c24}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>莞工之星 · 投票系统</h1>
    <p>每人每类限投一次</p>
  </div>

  <div id="status"></div>

  <div class="login-box">
    <input id="name" placeholder="姓名">
    <input id="stuId" placeholder="学号">
    <button onclick="login()">确认身份</button>
  </div>

  <div id="voteArea" style="display:none;">
    <div class="tab-group">
      <div class="tab active" onclick="tab('all')">全部</div>
      <div class="tab" onclick="tab('自强之星')">自强之星</div>
      <div class="tab" onclick="tab('志愿之星')">志愿之星</div>
      <div class="tab" onclick="tab('团队之星')">团队之星</div>
      <div class="tab" onclick="tab('学术之星')">学术之星</div>
      <div class="tab" onclick="tab('文体之星')">文体之星</div>
    </div>

    <div class="list" id="list"></div>
  </div>
</div>

<script>
function getCandidates() {
  return JSON.parse(localStorage.getItem("candidates") || '[{"id":1,"name":"测试1","category":"自强之星","college":"学院","votes":0},{"id":2,"name":"测试2","category":"志愿之星","college":"学院","votes":0},{"id":3,"name":"测试3","category":"团队之星","college":"学院","votes":0},{"id":4,"name":"测试4","category":"学术之星","college":"学院","votes":0},{"id":5,"name":"测试5","category":"文体之星","college":"学院","votes":0}]');
}

function saveCandidates(list) {
  localStorage.setItem("candidates", JSON.stringify(list));
}

function getRecords() {
  return JSON.parse(localStorage.getItem("voteRecords") || "[]");
}

function saveRecord(user, id) {
  const records = getRecords();
  records.push({ user, candidateId: id, time: new Date().toLocaleString() });
  localStorage.setItem("voteRecords", JSON.stringify(records));
}

let user = null;
let now = "all";

function login() {
  const n = document.getElementById("name").value.trim();
  const s = document.getElementById("stuId").value.trim();
  if (!n || !s) { msg("请填写姓名学号", "error"); return; }
  user = n + "_" + s;
  document.getElementById("voteArea").style.display = "block";
  msg("登录成功", "success");
  render();
}

function tab(cat) {
  now = cat;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

function render() {
  const list = getCandidates();
  const arr = now == "all" ? list : list.filter(i => i.category == now);
  document.getElementById("list").innerHTML = arr.map(i => `
    <div class="card">
      <h3>${i.name}</h3>
      <p>${i.category}</p>
      <p>${i.college}</p>
      <p>票数：${i.votes}</p>
      <button onclick="doVote(${i.id})">投票</button>
    </div>
  `).join("");
}

function doVote(id) {
  if (!user) { msg("请先登录", "error"); return; }
  const records = getRecords();
  const exists = records.some(r => r.user == user && r.candidateId == id);
  if (exists) { msg("你已经投过此人", "error"); return; }

  const list = getCandidates();
  const item = list.find(x => x.id == id);
  item.votes++;
  saveCandidates(list);
  saveRecord(user, id);
  msg("投票成功", "success");
  render();
}

function msg(t, c) {
  const s = document.getElementById("status");
  s.textContent = t; s.className = c; s.style.display = "block";
  setTimeout(() => s.style.display = "none", 2000);
}

render();
</script>
</body>
</html>
