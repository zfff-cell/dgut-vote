<script>
function getCandidates() {
  return JSON.parse(localStorage.getItem("candidates") || '[{"id":1,"name":"测试1","category":"自强之星","college":"学院","votes":0},{"id":2,"name":"测试2","category":"志愿之星","college":"学院","votes":0},{"id":3,"name":"测试3","category":"团队之星","college":"学院","votes":0},{"id":4,"name":"测试4","category":"学术之星","college":"学院","votes":0},{"id":5,"name":"测试5","category":"文体之星","college":"学院","votes":0}]');
}
function saveCandidates(list) {
  localStorage.setItem("candidates", JSON.stringify(list));
}
function getRecords() {
  return JSON.parse(localStorage.getItem("voteRecords") || "[]");
}

function renderCategoryStat() {
  const list = getCandidates();
  const catMap = {};
  list.forEach(i => {
    if (!catMap[i.category]) catMap[i.category] = { count: 0, total: 0 };
    catMap[i.category].count++;
    catMap[i.category].total += i.votes;
  });

  let html = "";
  for (let cat in catMap) {
    html += `
      <div class="stat-item">
        ${cat}：${catMap[cat].count} 人｜总票数：${catMap[cat].total}
      </div>
    `;
  }
  document.getElementById("categoryStat").innerHTML = html;
}

function renderCandidates() {
  const list = getCandidates();
  list.sort((a,b)=>b.votes - a.votes);
  document.getElementById("cList").innerHTML = list.map(i=>`
    <div class="card">
      <div>
        ${i.name}｜${i.category}｜${i.college}<br/>
        票数：${i.votes}
      </div>
      <button class="danger" onclick="delCandidate(${i.id})">删除</button>
    </div>
  `).join("");
}

function renderRecords() {
  const records = getRecords();
  document.getElementById("rList").innerHTML = records.map(r=>`
    <div class="row">
      <span>${r.user}</span>
      <span>${r.time}</span>
    </div>
  `).join("");
}

function addCandidate() {
  const name = document.getElementById("cname").value.trim();
  const cat = document.getElementById("ccat").value;
  const col = document.getElementById("ccol").value.trim();
  if (!name) return alert("请输入姓名");
  const list = getCandidates();
  const newId = list.length ? Math.max(...list.map(x=>x.id)) + 1 : 1;
  list.push({ id: newId, name, category: cat, college: col, votes: 0 });
  saveCandidates(list);
  renderAll();
}

function delCandidate(id) {
  let list = getCandidates();
  list = list.filter(x=>x.id != id);
  saveCandidates(list);
  renderAll();
}

function resetAllVotes() {
  if (!confirm("确定重置所有票数为 0？")) return;
  const list = getCandidates();
  list.forEach(i => i.votes = 0);
  saveCandidates(list);
  renderAll();
  alert("已重置所有票数");
}

function exportExcel() {
  const list = getCandidates();
  let csv = "排名,姓名,类别,学院,票数\n";
  list.sort((a,b)=>b.votes - a.votes);
  list.forEach((i, idx) => {
    csv += `${idx+1},${i.name},${i.category},${i.college},${i.votes}\n`;
  });
  const blob = new Blob(["\uFEFF"+csv], { type: "text/csv;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "莞工之星投票结果.csv";
  a.click();
}

function clearAll() {
  if (!confirm("确定清空所有数据？不可恢复！")) return;
  localStorage.removeItem("candidates");
  localStorage.removeItem("voteRecords");
  renderAll();
}

function renderAll() {
  renderCandidates();
  renderRecords();
  renderCategoryStat();
}

renderAll();
</script>
</body>
</html>
