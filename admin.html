<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年度莞工之星-后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif}
html,body{height:100%;background:#f7f9f7}
.login-box{background:#fff;padding:25px;border-radius:14px;max-width:320px;margin:40px auto;text-align:center}
.login-box .logo{width:55px;height:55px;margin:0 auto 10px;object-fit:contain}
.login-box input{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px;text-align:center;font-size:15px}
.login-box button{width:100%;padding:10px;background:#00783a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px}
.container{max-width:100%;min-height:100%;margin:0 auto;padding:20px 15px;display:flex;flex-direction:column}
.header{text-align:center;margin-bottom:20px}
.header .logo{width:55px;height:55px;margin:0 auto 10px;object-fit:contain}
.title{font-size:20px;font-weight:700;color:#00783a;margin-bottom:6px}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;justify-content:center}
.tab{padding:8px 10px;background:#eee;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap}
.tab.active{background:#00783a;color:#fff}
.btn-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.btn-bar button{flex:1;min-width:80px;padding:10px;border:none;border-radius:10px;background:#00783a;color:#fff;cursor:pointer;font-size:14px}
.card{background:#fff;border:1px solid #e0e6e0;border-radius:14px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px;position:relative}
.avatar{width:60px;height:60px;border-radius:50%;object-fit:cover;cursor:pointer}
.info{flex:1;min-width:0}
input{width:100%;border:1px solid #ddd;border-radius:6px;padding:5px;margin-bottom:5px;font-size:13px}
.count-box{display:flex;align-items:center;gap:5px;font-size:13px}
.count-box button{padding:3px 6px;background:#00783a;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px}
.del{position:absolute;top:8px;right:8px;background:#ff4d4f;color:#fff;border:none;border-radius:4px;padding:2px 5px;cursor:pointer;font-size:11px}
.file-input{display:none}
</style>
</head>
<body>

<div id="loginPage" class="login-box">
  <img class="logo" src="./dgut-logo.png" alt="东莞理工学院 Logo">
  <div class="title">管理后台登录</div>
  <input type="password" id="pwd" placeholder="请输入密码" autocomplete="off">
  <button onclick="login()">登录</button>
</div>

<div id="adminPage" style="display:none;flex:1;flex-direction:column">
  <div class="container">
    <div class="header">
      <img class="logo" src="./dgut-logo.png" alt="东莞理工学院Logo">
      <div class="title">2026年度莞工之星 · 管理后台</div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="btn-bar">
      <button onclick="addItem()">+ 添加选手</button>
      <button onclick="exportData()">导出Excel</button>
      <button onclick="resetAll()">重置投票</button>
    </div>
    <div id="list" style="flex:1;overflow-y:auto"></div>
  </div>
</div>

<input type="file" class="file-input" id="fileInput" accept="image/*">

<script>
const ADMIN_PASSWORD = "123456";
const types = [
  {key:"self",name:"自强之星"},
  {key:"study",name:"学术之星"},
  {key:"sport",name:"文体之星"},
  {key:"volunteer",name:"志愿之星"},
  {key:"team",name:"团队之星"}
];
let currentType = "self";
let editImgId = null;

function login(){
  if(document.getElementById('pwd').value===ADMIN_PASSWORD){
    document.getElementById('loginPage').style.display="none";
    document.getElementById('adminPage').style.display="flex";
    initData();
    render();
  }else alert("密码错误");
}

function initData(){
  if(!localStorage.getItem('voteData')){
    localStorage.setItem('voteData',JSON.stringify([
      {id:"s1",type:"self",name:"自强候选人1",desc:"计算机学院 | 网技部",avatar:"https://picsum.photos/80?1",count:0},
      {id:"st1",type:"study",name:"学术候选人1",desc:"计算机学院 | 网技部",avatar:"https://picsum.photos/80?2",count:0}
    ]));
  }
}

function renderTabs(){
  const t = document.getElementById('tabs');
  t.innerHTML = '';
  types.forEach(x=>{
    t.innerHTML+=`<div class="tab ${currentType==x.key?'active':''}" onclick="switchType('${x.key}')">${x.name}</div>`;
  });
}

function switchType(k){
  currentType=k; renderTabs(); render();
}

function render(){
  const all = JSON.parse(localStorage.getItem('voteData'));
  const list = document.getElementById('list');
  list.innerHTML = '';
  all.filter(it=>it.type==currentType).forEach(it=>{
    list.innerHTML+=`
    <div class="card">
      <img class="avatar" src="${it.avatar}" onclick="pickImg('${it.id}')">
      <div class="info">
        <input value="${it.name}" oninput="save('${it.id}','name',this.value)">
        <input value="${it.desc}" oninput="save('${it.id}','desc',this.value)">
        <div class="count-box">
          <span>票数：${it.count}</span>
          <button onclick="setCount('${it.id}')">修改</button>
        </div>
      </div>
      <button class="del" onclick="del('${it.id}')">删除</button>
    </div>`;
  });
}

function save(id,k,v){
  const a=JSON.parse(localStorage.getItem('voteData'));
  const i=a.findIndex(x=>x.id==id);
  if(i>=0) a[i][k]=v;
  localStorage.setItem('voteData',JSON.stringify(a));
}

function pickImg(id){ editImgId=id; document.getElementById('fileInput').click(); }
document.getElementById('fileInput').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f)return;
  const u=URL.createObjectURL(f);
  const a=JSON.parse(localStorage.getItem('voteData'));
  const i=a.findIndex(x=>x.id==editImgId);
  a[i].avatar=u;
  localStorage.setItem('voteData',JSON.stringify(a));
  render();
});

function addItem(){
  const a=JSON.parse(localStorage.getItem('voteData'));
  a.push({
    id:Date.now().toString(),
    type:currentType,
    name:"新选手",
    desc:"学院 | 部门",
    avatar:"https://picsum.photos/80?"+Math.random(),
    count:0
  });
  localStorage.setItem('voteData',JSON.stringify(a));
  render();
}

function del(id){
  if(!confirm("确定删除？"))return;
  const a=JSON.parse(localStorage.getItem('voteData'));
  localStorage.setItem('voteData',JSON.stringify(a.filter(x=>x.id!=id)));
  render();
}

function setCount(id){
  const n=prompt("请输入票数：");
  if(!n||isNaN(n))return;
  const a=JSON.parse(localStorage.getItem('voteData'));
  const i=a.findIndex(x=>x.id==id);
  a[i].count=parseInt(n);
  localStorage.setItem('voteData',JSON.stringify(a));
  render();
}

function resetAll(){
  if(confirm("确定重置所有投票记录？")){
    types.forEach(t=>localStorage.removeItem('voted_'+t.key));
    alert("已重置所有投票状态");
  }
}

function exportData(){
  const a=JSON.parse(localStorage.getItem('voteData'));
  let csv="类别,姓名,学院部门,票数\n";
  const typeName={self:"自强之星",study:"学术之星",sport:"文体之星",volunteer:"志愿之星",team:"团队之星"};
  a.forEach(it=>{
    csv+=`${typeName[it.type]},${it.name},${it.desc},${it.count}\n`;
  });
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const aTag=document.createElement('a');
    aTag.href=URL.createObjectURL(blob);
    aTag.download="2026莞工之星投票结果.csv";
    aTag.click();
}
renderTabs();
</script>
</body>
</html>
