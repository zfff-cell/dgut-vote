<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>莞工之星管理后台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root { --green: #28a745; }
body { font-family: "Microsoft YaHei", sans-serif; background: #e8f5e9; padding: 15px; }
.box { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; }
.header { text-align: center; margin-bottom: 20px; }
.logo { width: 90px; }
h1 { color: var(--green); font-size: 20px; }
.login { text-align: center; margin: 40px 0; }
input, button { padding: 10px; font-size: 14px; margin: 5px; border-radius: 6px; border: 1px solid #ccc; }
button { background: var(--green); color: white; border: none; cursor: pointer; }
.table { width: 100%; border-collapse: collapse; margin-top: 20px; }
.table th, .table td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
</style>
</head>
<body>
<div class="box">
  <div class="header">
    <img src="dgut-logo.png" class="logo" alt="Logo">
    <h1>莞工之星管理后台</h1>
  </div>

  <div class="login" id="loginBox">
    <div>请输入管理密码</div>
    <input type="password" id="pwd" placeholder="密码">
    <button onclick="doLogin()">登录</button>
  </div>

  <div id="adminPanel" style="display:none;">
    <button onclick="refreshData()">刷新数据</button>
    <button onclick="setZero()">一键清空票数</button>
    <table class="table">
      <thead>
        <tr><th>姓名</th><th>类别</th><th>学院</th><th>票数</th></tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
const supabase = supabaseJs.createClient(
  "https://xttxhcalaqwtufhmfji.supabase.co",
  "sb_publishable_aXblcIYw2XZGSyNjUuh4mQ_o_e"
);

const ADMIN_PWD = "123456";

function doLogin() {
  const val = document.getElementById("pwd").value;
  if (val === ADMIN_PWD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    refreshData();
  } else {
    alert("密码错误");
  }
}

async function refreshData() {
  const { data, error } = await supabase
    .from("candidates")
    .select("*")
    .order("votes", { ascending: false });
  if (error) return alert("加载失败：" + error.message);
  document.getElementById("tbody").innerHTML = data.map(p => `
    <tr>
      <td>${p.name}</td>
      <td>${p.category}</td>
      <td>${p.college}</td>
      <td>${p.votes || 0}</td>
    </tr>
  `).join("");
}

async function setZero() {
  if (!confirm("确定要把所有票数清零吗？")) return;
  const { error } = await supabase.from("candidates").update({ votes: 0 });
  if (error) alert("失败：" + error.message);
  else { alert("已清零"); refreshData(); }
}
</script>
</body>
</html>
